<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thegioididong.com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header class="top-header">
        <img style="width: 80%;" src="img/anh1.png" alt="">
    </header>
    <header class="mid-header">
        <div class="container">
            <ul>
                <li><a href=""><img style="width: 190px;" src="img/logotgdd.png" alt=""></a></li>
                <li style="margin-right: 290px;width: 350px; margin-right: 60px;"><i
                        class="fa-solid fa-magnifying-glass"></i><input type="text"
                        placeholder="Mở bán Laptop chính hãng"></li>
                <li><a href=""><button><i class="fa-solid fa-person"></i>Đăng nhập</button></a></li>
                <li><a href=""><button><i class="fa-solid fa-cart-flatbed"></i>Giỏ hàng</button></a></li>
                <li id="adress-form">
                    <a href="#"><button class="location-btn"><i class="fa-solid fa-location-dot"></i><span>Hồ Chí
                                Minh</span><i style="padding-left: 152px;"
                                class="fa-solid fa-angle-right"></i></button></a>
                </li>
                <div class="adress-form">
                    <div class="adress-form-content">
                        <h2>Chọn địa chỉ nhận hàng <span><i id="btn-close" style="color: rgb(81, 74, 74);"
                                    class="fa-solid fa-xmark"></i></span></h2>
                        <form action="">
                            <div><i style="color: black;" class="fa-solid fa-magnifying-glass"></i><input type="text"
                                    placeholder="Nhập địa chỉ số nhà,tên đường"></div>
                            <h3>Hoặc</h3>
                            <select name="" id="">
                                <option value="#">Chọn địa điểm</option>
                                <option value="#">Hồ Chí Minh</option>
                            </select>
                            <select name="" id="">
                                <option value="#">Chọn quận huyện</option>
                                <option value="#">Quận 7</option>
                            </select>
                            <select name="" id="">
                                <option value="#">Chọn phường xã</option>
                                <option value="#">Tân Mỹ</option>
                            </select>
                            <img style="width: 250px;" src="img/map.png" alt="">
                        </form>
                    </div>
                </div>
            </ul>
        </div>
    </header>
    <header class="bottom-header">
        <div class="container">
            <div class="bottom-header-content">
                <ul>
                    <li><a href=""><button><i class="fa-solid fa-mobile"></i> Điện thoại</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-laptop"></i> Laptop</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-headphones"></i> Phụ kiện <i
                                    class="fa-solid fa-angle-down"></i></button></a></li>
                    <li><a href=""><button><i class="fa-brands fa-android"></i> Smartwatch</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-clock"></i> Đồng hồ</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-tablet"></i> Tablet</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-arrow-rotate-left"></i> Máy cũ,Thu cũ
                                <i class="fa-solid fa-angle-down"></i></button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-computer"></i> Màn hình,Máy in</button></a></li>
                    <li><a href=""><button><i class="fa-solid fa-sim-card"></i> Sim,Thẻ cào <i
                                    class="fa-solid fa-angle-down"></i></button></a></li>
                    <li><a href=""><button><i class="fa-brands fa-stackpath"></i> Dịch vụ tiện ích <i
                                    class="fa-solid fa-angle-down"></i></button></a></li>
                </ul>
            </div>
        </div>
    </header>
    <main></main>
    <footer></footer>
    <script src="main.js"></script>
</body>

</html>
